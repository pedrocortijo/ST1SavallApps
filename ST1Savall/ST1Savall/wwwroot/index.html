    <script>
        window.onerror = function(msg, url, line, col, error) {
            if (msg && msg.indexOf("ResizeObserver") !== -1) return false;
            var errDiv = document.createElement('div');
            errDiv.style = "position:absolute; top:0; left:0; right:0; background:red; color:white; z-index:99999; padding:10px; font-family:monospace;";
            errDiv.innerText = "JS Error: " + msg + " at " + url + ":" + line + (col ? ":" + col : "");
            document.body.appendChild(errDiv);
            return false;
        };
    </script>

    <script>
        (function() {
            try {
                var theme = localStorage.getItem("theme");
                if (theme) {
                    document.getElementById("theme-link").href = "_content/DevExpress.Blazor.Themes/" + theme + ".bs5.min.css";
                    document.documentElement.className = "theme-" + theme;
                }
            } catch (e) {}
        })();
    </script>
